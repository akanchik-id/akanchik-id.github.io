<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>explore - Under</title>
<link rel="icon" href="/stickerss/logo.png">
<style>

/* === ORIGINAL CSS FROM YOUR FILE (preserved) === */
@font-face { font-family: 'ZeroCool'; src: url('/static.ttf?v=7'); }
:root {
    --bg:#f0f0f2;--bg2:#ffffff;--bg3:#f5f5f7;--bg4:#e8e8eb;
    --text:#111111;--text2:#555555;--text3:#999999;
    --border:#e0e0e0;--border2:#d0d0d0;
    --accent:#f39c12;--accent2:#e67e22;
    --danger:#ff3b30;--safe:#34c759;--blue:#007aff;
    --nav-bg:#ffffff;--nav-text:#111111;--nav-border:rgba(0,0,0,0.08);
    --msg-mine:#f39c12;--msg-other:#ffffff;--msg-other-border:#e8e8e8;
    --card-shadow:0 2px 12px rgba(0,0,0,0.08);
    --loader-bg:#f0f0f2;--input-bg:#ffffff;--overlay:rgba(0,0,0,0.5);
    --radius:16px;--radius-sm:10px;--radius-lg:24px;
    --profile-color:#f39c12;
}
[data-theme="dark"] {
    --bg:#0d0d0f;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:#38383a;--border2:#2c2c2e;
    --nav-bg:#1c1c1e;--nav-text:#f2f2f7;--nav-border:rgba(255,255,255,0.06);
    --msg-other:#2c2c2e;--msg-other-border:#38383a;
    --card-shadow:0 2px 12px rgba(0,0,0,0.4);
    --loader-bg:#0d0d0f;--input-bg:#1c1c1e;--overlay:rgba(0,0,0,0.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
body{background:var(--bg);margin:0;padding:0;font-family:'ZeroCool',system-ui,monospace;color:var(--text);-webkit-user-select:none;user-select:none;overscroll-behavior:none;}
input,textarea{-webkit-user-select:text!important;user-select:text!important;}
.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
/* SPLASH - fixed to not show on every click */
#splash{position:fixed;inset:0;background:var(--loader-bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .4s,transform .4s;}
#splash.out{opacity:0;pointer-events:none;transform:scale(1.04);}
#splash.instant-hide{display:none!important;}
.splash-gif{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);animation:splashPulse 1s ease-in-out 2 forwards;}
.splash-title{font-size:17px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;opacity:0;animation:fadeUp .5s .4s ease forwards;}
@keyframes splashPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(243,156,18,.4)}50%{transform:scale(1.06);box-shadow:0 0 0 14px rgba(243,156,18,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* NAV - compact app style override */
.nav{flex-shrink:0;background:var(--nav-bg);display:flex;width:100%;border-top:1px solid var(--nav-border);padding:4px 0;padding-bottom:max(4px,env(safe-area-inset-bottom));z-index:100;will-change:transform;position:relative;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 2px;cursor:pointer;position:relative;transition:opacity .15s;}
.nav-item:active{opacity:.6;}
.ni-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(0.34,1.56,0.64,1);will-change:transform;position:relative;}
.ni-icon svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.nav-item.active .ni-icon{transform:scale(1.1) translateY(-2px);}
.nav-item.active .ni-icon svg{stroke:var(--accent);}
.ni-label{font-size:7px;color:var(--text3);margin-top:1px;letter-spacing:0.3px;transition:color .2s;}
.nav-item.active .ni-label{color:var(--accent);}
.ni-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:1px;opacity:0;transition:opacity .2s;}
.nav-item.active .ni-dot{opacity:1;}
.nav-badge{position:absolute;top:-2px;right:-6px;background:var(--danger);color:#fff;border-radius:10px;min-width:16px;height:16px;line-height:16px;padding:0 4px;font-size:8px;text-align:center;border:2px solid var(--nav-bg);pointer-events:none;}
/* SCREENS */
.screen{display:none;min-height:100%;padding:0 0 80px;animation:screenIn .25s ease both;}
.screen.active{display:block;}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{padding:16px 16px 8px;padding-top:max(16px,env(safe-area-inset-top));font-size:22px;font-weight:bold;color:var(--text);}
/* CARDS - compact */
.card{background:var(--bg2);border-radius:16px;overflow:hidden;margin:0 12px 8px;box-shadow:var(--card-shadow);border:1px solid var(--border);}
.card-padded{background:var(--bg2);border-radius:16px;padding:14px;margin:0 12px 8px;box-shadow:var(--card-shadow);border:1px solid var(--border);}
.field{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'ZeroCool',monospace;background:var(--input-bg);color:var(--text);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;display:block;}
.field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(243,156,18,0.15);}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.field-wrap{margin-bottom:10px;}
.btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:'ZeroCool',monospace;cursor:pointer;font-size:13px;font-weight:bold;transition:opacity .12s,transform .12s;-webkit-appearance:none;display:block;text-align:center;}
.btn:active{opacity:.75;transform:scale(0.98);}
.btn-accent{background:var(--accent);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-ghost{background:var(--bg3);color:var(--text);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-sm{padding:8px 14px;font-size:11px;border-radius:10px;border:none;font-family:'ZeroCool',monospace;cursor:pointer;-webkit-appearance:none;}
.btn-sm:active{opacity:.7;}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);}
input[type="email"]::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-credentials-auto-fill-button,
input[type="email"]::-webkit-contacts-auto-fill-button,
input[type="password"]::-webkit-contacts-auto-fill-button {display: none !important;visibility: hidden;pointer-events: none;width: 0 !important;height: 0 !important;}
input::-webkit-credit-card-auto-fill-button {display: none !important;}
.profile-top{background:var(--bg2);padding:16px 16px 12px;margin-bottom:2px;text-align:center;position:relative;border-radius:16px;margin:8px 12px 8px;}
.profile-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--profile-color, var(--accent));object-fit:cover;margin:0 auto 10px;display:block;}
.profile-name{font-size:17px;color:var(--text);text-transform:uppercase;margin-bottom:2px;font-weight:800;}
.profile-username{font-size:11px;color:var(--text3);margin-bottom:6px;}
.profile-status{font-size:12px;color:var(--text2);margin-bottom:12px;white-space:pre-wrap;}
.profile-stats{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid var(--border);}
.stat-box{text-align:center;cursor:pointer;flex:1;padding:4px;}
.stat-box:active{opacity:.6;}
.stat-val{font-size:18px;font-weight:bold;color:var(--text);}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.online-dot{width:7px;height:7px;background:var(--safe);border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px;animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.carousel{width:100%;height:90px;display:flex;align-items:center;overflow-x:auto;padding:0 50%;scrollbar-width:none;scroll-snap-type:x mandatory;touch-action:pan-x;}
.carousel::-webkit-scrollbar{display:none;}
.carousel-item{flex-shrink:0;width:46px;height:46px;border-radius:50%;margin:0 8px;border:2px solid var(--border);scroll-snap-align:center;transform:scale(0.75);opacity:.5;cursor:pointer;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);object-fit:cover;}
.carousel-item.active{border-color:var(--accent);transform:scale(1.3);opacity:1;}
.user-row{background:var(--bg2);display:flex;align-items:center;padding:8px 14px;gap:10px;cursor:pointer;transition:background .15s;animation:itemSlide .25s ease both;border-radius:12px;margin:2px 12px;}
.user-row:active{background:var(--bg3);}
@keyframes itemSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.urow-av{width:38px;height:38px;border-radius:50%;border:2px solid var(--profile-color, var(--accent));object-fit:cover;flex-shrink:0;}
.urow-info{flex:1;min-width:0;}
.urow-name{font-size:13px;color:var(--text);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;}
.urow-sub{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urow-sep{height:1px;background:var(--border);margin-left:70px;}
.chat-row{background:var(--bg2);display:flex;align-items:center;padding:8px 14px;gap:10px;cursor:pointer;transition:background .15s;animation:itemSlide .25s ease both;position:relative;border-radius:12px;margin:2px 12px;}
.chat-row:active{background:var(--bg3);}
.chat-row-av-wrap{position:relative;flex-shrink:0;}
.chat-row-av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--profile-color, var(--accent));}
.chat-row-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--safe);border-radius:50%;border:2px solid var(--bg2);}
.chat-type-badge{position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2);}
.chat-type-badge svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.chat-row-info{flex:1;min-width:0;}
.chat-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px;}
.chat-row-name{font-size:13px;color:var(--text);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-weight:700;}
.chat-row-time{font-size:10px;color:var(--text3);flex-shrink:0;}
.chat-row-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chat-row-last{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-unread{background:var(--danger);color:#fff;border-radius:10px;min-width:18px;height:18px;line-height:18px;padding:0 5px;font-size:9px;text-align:center;flex-shrink:0;}
.chat-fs{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:1500;transform:translateX(100%);transition:transform .3s cubic-bezier(0.4,0,0.2,1);}
.chat-fs.open{transform:translateX(0);}
.chat-hd{background:var(--nav-bg);color:var(--nav-text);padding:10px 10px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--nav-border);backdrop-filter:blur(20px);}
.chat-hd-back{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:4px 8px 4px 2px;display:flex;align-items:center;gap:2px;font-family:'ZeroCool',monospace;flex-shrink:0;}
.chat-hd-back:active{opacity:.6;}
.chat-hd-back svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.chat-hd-av{width:36px;height:36px;border-radius:50%;border:2px solid var(--profile-color, var(--accent));object-fit:cover;cursor:pointer;flex-shrink:0;}
.chat-hd-meta{flex:1;min-width:0;cursor:pointer;}
.chat-hd-name{font-size:14px;text-transform:uppercase;color:var(--nav-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hd-status{font-size:10px;color:var(--text3);min-height:13px;}
.chat-hd-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0;}
.chat-hd-btn:active{color:var(--accent);}
.chat-hd-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.pinned-bar{background:var(--bg3);border-bottom:2px solid var(--accent);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer;}
.pinned-bar svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;flex-shrink:0;}
.pinned-text{flex:1;font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pinned-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;}
.typing-dots {display: inline-flex;gap: 4px;align-items: center;padding: 4px 10px;background: var(--bg3);border-radius: 12px;}
.typing-dots span {width: 6px;height: 6px;background: var(--text3);border-radius: 50%;animation: dotBounce 1.2s ease-in-out infinite;}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }30% { transform: translateY(-6px); opacity: 1; }}
#chat-messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 6px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;background: linear-gradient(to bottom, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.1) 100%);background-blend-mode: overlay;}
[data-theme="dark"] #chat-messages {background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);}
.msg-row{display:flex;align-items:flex-end;gap:6px;padding:1px 0;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--profile-color, var(--accent));object-fit:cover;flex-shrink:0;margin-bottom:2px;cursor:pointer;}
.msg-row.mine .msg-av{display:none;}
.msg-swipe{position:relative;display:inline-flex;max-width:calc(100% - 38px);touch-action:pan-y;will-change:transform;}
.msg-row.mine .msg-swipe{margin-left:auto;}
.msg-row:not(.mine) .msg-swipe{margin-right:auto;}
.reply-arrow{position:absolute;opacity:0;pointer-events:none;top:50%;transform:translateY(-50%);transition:opacity .1s;flex-shrink:0;}
.msg-swipe.mine .reply-arrow{right:-24px;}
.msg-swipe.other .reply-arrow{left:-24px;}
.reply-arrow svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.msg{display:inline-block;padding:8px 10px;border-radius:18px;font-size:13px;line-height:1.4;position:relative;cursor:default;animation:msgIn .2s cubic-bezier(0.34,1.56,0.64,1) both;-webkit-user-select:text;user-select:text;max-width:100%;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap;background-color: rgba(255,255,255,0.85);backdrop-filter: blur(2px);}
[data-theme="dark"] .msg {background-color: rgba(30,30,30,0.85);}
@keyframes msgIn{from{opacity:0;transform:scale(0.9) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.msg.mine{background: var(--msg-mine);color:#fff;border-bottom-right-radius:4px;backdrop-filter: none;}
.msg.other{background: var(--msg-other);color:var(--text);border:1px solid var(--msg-other-border);border-bottom-left-radius:4px;backdrop-filter: none;}
.msg.pinned-hl{box-shadow:0 0 0 2px var(--accent);}
.sender-name{font-size:10px;color:var(--accent);margin-bottom:3px;font-weight:bold;cursor:pointer;}
.reply-block{background:rgba(0,0,0,0.08);border-left:3px solid rgba(255,255,255,0.6);border-radius:8px;padding:4px 8px;margin-bottom:5px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;cursor:pointer;}
.msg.other .reply-block{border-left-color:var(--accent);background:rgba(243,156,18,0.1);}
.msg-meta{font-size:9px;opacity:.7;margin-top:4px;display:flex;gap:4px;justify-content:flex-end;align-items:center;}
.ticks{font-size:11px;font-weight:bold;}
.ticks.seen{color:#b3f0ff;}
.msg.other .ticks.seen{color:var(--blue);}
.edited-lbl{font-size:8px;opacity:.7;}
.msg a{color:inherit;text-decoration:underline;}
.msg-photo{display:block;max-width:210px;max-height:280px;border-radius:12px;cursor:zoom-in;}
.msg-photo-wrap{position:relative;display:inline-block;}
.msg-photo-dl{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:8px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:'ZeroCool',monospace;}
.msg-audio{display:flex;align-items:center;gap:8px;padding:2px 0;min-width:170px;}
.msg-audio-play{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.25);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
.msg-audio-play:active{transform:scale(.85);}
.msg.other .msg-audio-play{background:var(--accent);color:#fff;}
.msg-audio-play svg{width:14px;height:14px;fill:currentColor;}
.msg-audio-bar{flex:1;height:3px;background:rgba(255,255,255,0.3);border-radius:2px;cursor:pointer;overflow:hidden;}
.msg.other .msg-audio-bar{background:rgba(0,0,0,0.12);}
.msg-audio-prog{height:100%;background:currentColor;width:0%;transition:width .1s;}
.msg-audio-dur{font-size:9px;opacity:.7;flex-shrink:0;}
.msg-sticker{width:100px;height:100px;object-fit:contain;display:block;border-radius:8px;}
.msg-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.reaction-chip{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:2px 7px;font-size:13px;cursor:pointer;transition:transform .15s;display:flex;align-items:center;gap:2px;}
.reaction-chip:active{transform:scale(1.18);}
.reaction-chip.mine{background:rgba(243,156,18,0.15);border-color:var(--accent);}
.reaction-chip .rcount{font-size:10px;color:var(--text2);}
.msg-post-card{border-radius:12px;overflow:hidden;max-width:220px;border:1px solid var(--msg-other-border);background:var(--bg2);cursor:pointer;}
.msg-post-photo{width:100%;height:120px;object-fit:cover;display:block;}
.msg-post-info{padding:6px 8px;font-size:10px;color:var(--text2);}
.msg-post-caption{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.typing-row{font-size:11px;color:var(--text3);padding:4px 12px;min-height:20px;flex-shrink:0;font-style:italic;}
.chat-indicator{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.ci-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0;}
.ci-bar.edit{background:var(--accent);}
.ci-bar.reply{background:var(--blue);}
.ci-info{flex:1;min-width:0;}
.ci-label{font-size:9px;text-transform:uppercase;font-weight:bold;}
.ci-label.edit{color:var(--accent);}
.ci-label.reply{color:var(--blue);}
.ci-text{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-close{background:none;border:none;cursor:pointer;padding:4px;color:var(--text3);}
.ci-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.voice-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);flex-shrink:0;border-top:1px solid var(--border);}
.voice-dot{width:9px;height:9px;background:var(--danger);border-radius:50%;animation:vBlink .8s infinite;}
@keyframes vBlink{0%,100%{opacity:1}50%{opacity:.2}}
.voice-time{flex:1;font-size:12px;color:var(--text);}
.voice-cancel{background:none;border:none;cursor:pointer;color:var(--danger);font-size:20px;line-height:1;}
.voice-send{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:7px 14px;cursor:pointer;font-family:'ZeroCool';font-size:12px;}
.chat-input-area{background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;align-items:center;}

.post-create-panel{position:fixed;inset:0;background:var(--bg);z-index:1600;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);}

.group-section{background:var(--bg2);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}

.loader{text-align:center;padding:30px;color:var(--text3);font-size:12px;}

.color-swatches{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0;}

.color-swatch.active{border-color:var(--text);transform:scale(1.1);}
.theme-pick{display:flex;gap:8px;margin-bottom:10px;}

.verify-warn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,59,48,.1);color:var(--danger);border-radius:8px;padding:6px 10px;font-size:10px;margin-top:6px;}

.toast-content{flex:1;font-size:12px;}
.toast-name{font-weight:bold;color:var(--text);}
.toast-text{color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toast-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px;}
@media(min-width:480px){.post-card,.card,.card-padded{margin-left:auto;margin-right:auto;max-width:460px;}.chat-row{max-width:460px;margin:0 auto;}}
.chat-input-area {position: sticky;bottom: 0;background: var(--bg2);z-index: 10;}
.chat-fs {position: fixed;bottom: 0;top: 0;height: 100%;}
input, textarea {autocomplete: off;autocorrect: off;autocapitalize: off;spellcheck: false;}
.btn-profile-color {border-color: var(--profile-color, var(--accent)) !important;}
.btn-profile-color-outline {background: transparent;border: 2px solid var(--profile-color, var(--accent));color: var(--profile-color, var(--accent));}
.btn-profile-color-outline:active {background: var(--profile-color, var(--accent));color: #fff;}
.chat-hd-av, .profile-av, .urow-av, .chat-row-av, .msg-av, .post-hd-av {border-color: var(--profile-color, var(--accent)) !important;}
.pinned-bar {cursor: pointer;}
.pinned-bar:hover {background: var(--bg4);}
.reply-block {cursor: pointer;}
.reply-block:hover {background: rgba(243,156,18,0.2);}
/* app compact overrides */
body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.app-shell-override{display:none}


@font-face { font-family: 'ZeroCool'; src: url('/static.ttf?v=7'); }

:root {
  --bg:#f2f2f7; --bg2:#ffffff; --bg3:#eef0f3; --bg4:#e5e7eb;
  --text:#0f0f12; --text2:#6b7280; --text3:#9ca3af;
  --border:#ececef; --border2:#e5e7eb;
  --accent:#ff8a00; --accent2:#e67e22;
  --danger:#ff3b30; --safe:#30d158; --blue:#0a84ff;
  --nav-bg:rgba(255,255,255,0.82); --nav-border:rgba(0,0,0,0.06);
  --header-bg:rgba(255,255,255,0.78);
  --msg-mine:#ff8a00; --msg-other:#ffffff;
  --shadow:0 8px 24px rgba(0,0,0,0.06);
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
  --profile-color:var(--accent);
  --bg2-rgb:255,255,255;
}
[data-theme="dark"] {
  --bg:#000000; --bg2:#1c1c1e; --bg3:#2c2c2e; --bg4:#3a3a3c;
  --text:#f5f5f7; --text2:#98989f; --text3:#636366;
  --border:#2a2a2c; --border2:#2c2c2e;
  --nav-bg:rgba(28,28,30,0.82); --nav-border:rgba(255,255,255,0.08);
  --header-bg:rgba(28,28,30,0.78);
  --msg-other:#2c2c2e;
  --shadow:0 8px 24px rgba(0,0,0,0.3);
  --bg2-rgb:28,28,30;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;padding:0;background:var(--bg);font-family:'ZeroCool',-apple-system,system-ui,monospace;color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
body{overflow:hidden}

.app-shell{
  max-width:480px;margin:0 auto;
  height:100dvh;height:100vh;
  display:flex;flex-direction:column;
  background:var(--bg);position:relative;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
}

/* APP HEADER - like iOS app */
.app-header{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  padding-top:max(6px,env(safe-area-inset-top));
  background:var(--header-bg);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;
}
.app-header-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.app-header-action{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.app-header-action svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:2}

/* SCROLL AREA */
.app-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:84px}
.app-scroll.no-nav{padding-bottom:0}

/* BOTTOM TAB BAR - app style, not website */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  height:68px;height:calc(56px + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--nav-bg);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-top:1px solid var(--nav-border);
  display:flex;z-index:100;
}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;position:relative}
.tab-icon-wrap{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.tab-item.active .tab-icon-wrap{background:var(--text);transform:translateY(-2px)}
.tab-item.active .tab-icon-wrap svg{stroke:#fff}
.tab-icon-wrap svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.tab-label{font-size:9px;letter-spacing:.2px;color:var(--text3);transition:color .2s}
.tab-item.active .tab-label{color:var(--text)}
.tab-badge{position:absolute;top:4px;right:18px;min-width:16px;height:16px;padding:0 4px;background:var(--danger);color:#fff;border-radius:10px;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}

/* COMPACT CARDS */
.card{background:var(--bg2);border-radius:var(--radius);margin:8px 12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-padded{background:var(--bg2);border-radius:var(--radius);padding:14px;margin:8px 12px;box-shadow:var(--shadow);border:1px solid var(--border)}

/* INPUTS - compact pill */
.field{width:100%;height:40px;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'ZeroCool',monospace;background:var(--bg2);color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.field:focus{border-color:var(--accent)}
.field-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
textarea.field{height:auto;padding:12px 14px;resize:none}

/* BUTTONS */
.btn{width:100%;height:42px;border-radius:12px;border:none;font-family:'ZeroCool',monospace;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.8}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{height:32px;padding:0 12px;font-size:11px;border-radius:10px;border:none;font-family:'ZeroCool';cursor:pointer}

/* PROFILE - compact */
.profile-compact{text-align:center;padding:18px 16px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.profile-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--profile-color);object-fit:cover;margin:0 auto 10px;display:block}
.profile-name{font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:.2px}
.profile-username{font-size:12px;color:var(--text3);margin:2px 0 6px}
.profile-status{font-size:12px;color:var(--text2);line-height:1.4;white-space:pre-wrap;max-width:300px;margin:0 auto 12px}
.profile-stats{display:flex;justify-content:center;gap:24px;padding-top:10px;border-top:1px solid var(--border);margin-top:10px}
.stat{text-align:center;min-width:56px}
.stat-val{font-size:17px;font-weight:800}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:2px;letter-spacing:.5px}

/* USER ROW - compact like Telegram */
.user-row{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .12s}
.user-row:active{background:var(--bg3)}
.urow-av{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--profile-color);flex-shrink:0}
.urow-info{flex:1;min-width:0}
.urow-name{font-size:13px;font-weight:700;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urow-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* CHAT ROW */
.chat-row{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer}
.chat-row:active{background:var(--bg3)}
.chat-row-av{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--profile-color)}
.chat-row-info{flex:1;min-width:0}
.chat-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.chat-row-name{font-size:13px;font-weight:700;text-transform:uppercase;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-row-time{font-size:10px;color:var(--text3);flex-shrink:0}
.chat-row-last{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* POST - compact feed */
.post-card{background:var(--bg2);border-radius:16px;margin:8px 12px;overflow:hidden;border:1px solid var(--border)}
.post-hd{display:flex;align-items:center;gap:10px;padding:10px 12px}
.post-hd-av{width:32px;height:32px;border-radius:50%;border:2px solid var(--profile-color);object-fit:cover}
.post-hd-name{font-size:12px;font-weight:700;text-transform:uppercase}
.post-hd-time{font-size:10px;color:var(--text3)}
.post-photo{width:100%;max-height:520px;object-fit:cover;display:block;background:var(--bg3)}
.post-caption{padding:8px 12px 10px;font-size:13px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
.post-actions{display:flex;gap:4px;padding:6px 8px;border-top:1px solid var(--border)}
.post-action{height:32px;padding:0 10px;border-radius:20px;border:none;background:var(--bg3);display:flex;align-items:center;gap:5px;font-family:'ZeroCool';font-size:11px;color:var(--text2);cursor:pointer}
.post-action.liked{color:var(--danger);background:rgba(255,59,48,0.1)}
.post-action svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* CHAT MESSAGES - compact bubbles */
#chat-messages{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-row.mine{justify-content:flex-end}
.msg{max-width:78%;padding:8px 12px;border-radius:18px;font-size:14px;line-height:1.35;word-break:break-word;white-space:pre-wrap}
.msg.mine{background:var(--msg-mine);color:#fff;border-bottom-right-radius:4px}
.msg.other{background:var(--msg-other);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-meta{font-size:9px;opacity:.7;margin-top:3px;display:flex;justify-content:flex-end;gap:4px}
.sender-name{font-size:10px;color:var(--accent);font-weight:700;margin-bottom:2px;text-transform:uppercase}

/* INPUT BAR - like iMessage */
.chat-input-bar{flex-shrink:0;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.chat-inp{flex:1;height:36px;padding:0 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);font-family:'ZeroCool';font-size:13px;color:var(--text);outline:none}
.chat-inp:focus{border-color:var(--accent)}
.chat-btn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-btn.send{background:var(--accent);color:#fff}
.chat-btn.icon{background:var(--bg3);color:var(--text2)}

/* SEARCH */
.search-wrap{padding:8px 12px;position:sticky;top:52px;z-index:5;background:var(--bg)}
.search-bar{display:flex;align-items:center;gap:8px;height:36px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:0 12px}
.search-bar svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}
.search-inp{flex:1;border:none;background:transparent;font-family:'ZeroCool';font-size:13px;color:var(--text);outline:none}
.feed-tabs{display:flex;gap:4px;padding:6px;background:var(--bg3);border-radius:12px;margin:8px 12px}
.feed-tab{flex:1;height:30px;border:none;border-radius:9px;background:transparent;font-family:'ZeroCool';font-size:11px;color:var(--text3);cursor:pointer}
.feed-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s,transform .4s}
#splash.out{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-gif{width:72px;height:72px;border-radius:50%;border:3px solid var(--accent)}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px}
.sheet{background:var(--bg2);border-radius:20px;padding:16px;width:100%;max-width:420px;max-height:86vh;overflow-y:auto}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:12px}
.hidden{display:none!important}

/* TOAST */
.toast{position:fixed;top:12px;left:12px;right:12px;max-width:400px;margin:0 auto;background:var(--bg2);border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.2);transform:translateY(-120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;border-left:4px solid var(--accent)}
.toast.show{transform:translateY(0)}
.toast-av{width:36px;height:36px;border-radius:50%;object-fit:cover}

@media(min-width:520px){
  .app-shell{border-radius:24px;overflow:hidden;margin:12px auto;height:calc(100dvh - 24px);box-shadow:0 20px 60px rgba(0,0,0,.15)}
  .tab-bar{border-radius:0 0 24px 24px}
}

/* FIX: app-like compact + no splash flash */
html{opacity:0;transition:opacity .18s ease;}
html.loaded{opacity:1;}
#splash.instant-hide{display:none!important;}
body{max-width:480px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.app{max-width:480px;margin:0 auto;}

<script>
// SPLASH FIX - only show once per session
(function(){
  const s=document.getElementById('splash');
  if(sessionStorage.getItem('under_splash_done')){
    if(s){ s.style.display='none'; s.classList.add('instant-hide'); }
    document.documentElement.classList.add('loaded');
  } else {
    document.documentElement.classList.add('loaded');
    setTimeout(()=>{
      if(s){ s.classList.add('out'); setTimeout(()=>{ s.style.display='none'; sessionStorage.setItem('under_splash_done','1'); },400); }
    }, 800);
  }
})();

// SMOOTH NAVIGATION BETWEEN FILES
function navigateToFile(file){
  document.documentElement.style.opacity='0';
  setTimeout(()=>{ location.href=file; }, 120);
}

// Override showSection to handle separate files
function showSection(id){
  const map={account:'profile.html',feed:'feed.html',explore:'explore.html',chats:'chats.html',cabinet:'settings.html',activity:'activity.html',auth:'auth.html'};
  const currentFile = location.pathname.split('/').pop() || 'profile.html';
  const targetFile = map[id];
  if(targetFile && targetFile!==currentFile && id!=='chat-room' && id!=='view' && id!=='fans' && id!=='idols'){
    navigateToFile(targetFile);
    return;
  }
  // otherwise show inside same file (for view, fans, etc)
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const t=document.getElementById('screen-'+id);
  if(t) t.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+id);
  if(nav) nav.classList.add('active');
  window.currentSection=id;
}

// Set active screen for this file
document.addEventListener('DOMContentLoaded',()=>{
  const screenMap={'index.html':'account','profile.html':'account','feed.html':'feed','explore.html':'explore','chats.html':'chats','chat.html':'chats','settings.html':'cabinet','activity.html':'activity','auth.html':'auth'};
  const file = location.pathname.split('/').pop() || 'profile.html';
  const scr = screenMap[file] || 'explore';
  setTimeout(()=>{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const t=document.getElementById('screen-'+scr);
    if(t) t.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const nav=document.getElementById('nav-'+scr);
    if(nav) nav.classList.add('active');
  }, 50);
});
</script>
<script>

// === FULL ORIGINAL LOGIC RESTORED + FIXES ===
let currentUser=null,currentUserData={},currentViewedUid=null;
let tempAvatar=1,sessionStartTime=Date.now();
let chatsCache={},usersCache={},notifCache=[];
let activeChatId=null,chatTargetUid=null,chatTargetData={};
let editingMsgKey=null,replyingTo=null,pinnedMsgKey=null;
let activeMenuMsg=null,typingTimeout=null,lastTypingSent=0;
let currentMsgsArr=[],mediaRecorder=null,audioChunks=[],recTimerInt=null,recSeconds=0;
let hasTextInInput=false,isRecording=false;
let chatIsGroup=false,chatGroupData={};
let createGroupType='group',selectedGroupMembers={};
let activeCommentsPostId=null,currentPostOptionsId=null,currentPostOptionsAuthor=null;
let currentSection='account',searchTab='users',previousSection='account';
let exploreAllUsers=[],exploreAllGroups=[],exploreAllPosts=[];
let viewProfileListener=null,currentGroupSettingsId=null;
const listeners=[];
let editingFieldKey=null;
let feedTab='subscriptions';
let profileColorPickerInitialized=false;
let toastTimeout=null;

function trackRef(ref,event,cb){ref.on(event,cb);listeners.push({ref,event,cb});}
function clearAllListeners(){listeners.forEach(l=>{try{l.ref.off(l.event,l.cb);}catch(e){}});listeners.length=0;}
function clearChatListeners(){for(let i=listeners.length-1;i>=0;i--){const s=listeners[i].ref.toString();if(s.includes('/Chats/')||s.includes('/Typing/')){try{listeners[i].ref.off(listeners[i].event,listeners[i].cb);}catch(e){}listeners.splice(i,1);}}}

function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function linkify(text){const urlRegex=/(https?:\/\/[^\s<>\"]+)/g; return escapeHtml(text).replace(urlRegex, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');}
function makeChatId(a,b){return[a,b].sort().join('_');}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtLastSeen(ts){if(!ts)return'offline';const d=Date.now()-ts;if(d<90000)return'только что';if(d<3600000)return `${Math.floor(d/60000)}м`;const dt=new Date(ts);return dt.toLocaleDateString();}
function cleanUsername(u){return(u||'').toLowerCase().replace(/[^a-z0-9_]/g,'').replace(/^@/,'');}

const T={
 ru:{fan_btn:'Стать фанатом',unfan_btn:'Отписаться',online:'онлайн',offline:'оффлайн',empty_chats:'Чатов пока нет'},
 en:{fan_btn:'Become Fan',unfan_btn:'Unfollow',online:'online',offline:'offline',empty_chats:'No chats yet'}
};
let currentLang=localStorage.getItem('akanchik_lang')||'ru';
function L(k){return (T[currentLang]||T.ru)[k]||k;}

function setTheme(t){localStorage.setItem('akanchik_theme',t);document.documentElement.setAttribute('data-theme',t);}
function setAccent(hex){localStorage.setItem('akanchik_accent',hex);document.documentElement.style.setProperty('--accent',hex);}

function showSection(id){
  const fromChat = currentSection==='chat-room';
  previousSection = currentSection;
  currentSection=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const target=document.getElementById('screen-'+id);
  if(target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+id);
  if(nav) nav.classList.add('active');
  // For separate files, if id is different from current file's main screen, navigate to file
  const map={account:'profile.html',feed:'feed.html',explore:'explore.html',chats:'chats.html',cabinet:'settings.html',activity:'activity.html'};
  const currentPage = location.pathname.split('/').pop()||'profile.html';
  const expected = map[id];
  if(expected && expected!==currentPage && !fromChat){
    // smooth transition to other file
    document.documentElement.style.transition='opacity .15s';
    document.documentElement.style.opacity='0';
    setTimeout(()=>location.href=expected,120);
  }
}

function hideSplash(){
  const s=document.getElementById('splash');
  if(!s) return;
  if(sessionStorage.getItem('under_splash_done')){
    s.classList.add('instant-hide');
    s.style.display='none';
    return;
  }
  s.classList.add('out');
  setTimeout(()=>{ s.style.display='none'; sessionStorage.setItem('under_splash_done','1'); },500);
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    db.ref('Users/'+user.uid).on('value',snap=>{
      if(!snap.exists()){
        const nick=(user.email||'PLAYER').split('@')[0];
        db.ref('Users/'+user.uid).set({DisplayName:nick,username:cleanUsername(nick),Avatar:1,Status:'NEW PLAYER',Coins:100});
        return;
      }
      currentUserData=snap.val()||{};
      if(currentUserData.profileColor) document.documentElement.style.setProperty('--profile-color',currentUserData.profileColor);
      updateMyProfileUI();
      loadChats();
    });
    hideSplash();
  } else {
    location.href='auth.html';
  }
});

function updateMyProfileUI(){
  const d=currentUserData;
  if(!d) return;
  const av=document.getElementById('my-avatar'); if(av) av.src='/avatar'+(d.Avatar||1)+'.png';
  const name=document.getElementById('my-display-name'); if(name) name.innerText=(d.DisplayName||'PLAYER').toUpperCase();
  const uname=document.getElementById('my-username'); if(uname) uname.innerText='@'+(d.username||'');
  const status=document.getElementById('my-status'); if(status) status.innerText=d.Status||'';
  const fans=document.getElementById('my-fans-count'); if(fans) fans.innerText=d.Fans?Object.keys(d.Fans).length:0;
  const idols=document.getElementById('my-idols-count'); if(idols) idols.innerText=d.Idols?Object.keys(d.Idols).length:0;
  const coins=document.getElementById('my-coins-count'); if(coins) coins.innerText=d.Coins||0;
  loadMyPosts();
}

function loadMyPosts(){
  const uid=currentUser?.uid; if(!uid) return;
  const cont=document.getElementById('my-posts-list'); if(!cont) return;
  db.ref('Posts').orderByChild('uid').equalTo(uid).once('value').then(snap=>{
    let arr=[]; snap.forEach(s=>arr.push({pid:s.key,...s.val()}));
    arr.sort((a,b)=>(b.time||0)-(a.time||0));
    cont.innerHTML='';
    arr.forEach(p=>{
      const div=document.createElement('div'); div.className='post-card';
      div.innerHTML=`<div class="post-hd"><img src="/avatar${p.avatar||1}.png" class="post-hd-av"><div style="flex:1"><div class="post-hd-name">${escapeHtml((p.displayName||'').toUpperCase())}</div><div class="post-hd-time">${p.time?new Date(p.time).toLocaleDateString():''}</div></div></div>${p.photo?`<img src="${p.photo}" class="post-photo">`:''}<div class="post-caption">${linkify(p.text||'')}</div>`;
      cont.appendChild(div);
    });
  });
}

function loadChats(){
  if(!currentUser) return;
  db.ref(`UserChats/${currentUser.uid}`).on('value',snap=>{
    chatsCache=snap.val()||{};
    renderChatsList();
  });
}

function renderChatsList(){
  const cont=document.getElementById('chats-list'); if(!cont) return;
  const items=Object.entries(chatsCache).map(([id,c])=>({id,...c})).sort((a,b)=>(b.lastTime||0)-(a.lastTime||0));
  if(!items.length){ cont.innerHTML='<div class="empty-state">Чатов пока нет</div>'; return; }
  cont.innerHTML='';
  items.forEach(c=>{
    const row=document.createElement('div'); row.className='chat-row';
    row.innerHTML=`<img src="${c.avatar||'/avatar1.png'}" class="chat-row-av"><div class="chat-row-info"><div class="chat-row-top"><div class="chat-row-name">${escapeHtml((c.name||'PLAYER').toUpperCase())}</div><div class="chat-row-time">${c.lastTime?fmtTime(c.lastTime):''}</div></div><div class="chat-row-bottom"><div class="chat-row-last">${escapeHtml((c.lastText||'').substring(0,40))}</div>${c.unread?`<span class="chat-unread">${c.unread}</span>`:''}</div></div>`;
    row.onclick=()=>{ activeChatId=c.id; chatTargetUid=c.with; location.href='chat.html?id='+c.id; };
    cont.appendChild(row);
  });
}

function loadFeed(){
  const cont=document.getElementById('feed-list'); if(!cont) return;
  cont.innerHTML='<div class="empty-state">Загрузка...</div>';
  const idolIds=currentUserData.Idols?Object.keys(currentUserData.Idols):[];
  db.ref('Posts').orderByChild('time').limitToLast(100).once('value').then(snap=>{
    let posts=[]; snap.forEach(s=>{const p=s.val(); if(!p) return; if(feedTab==='subscriptions'){ if(idolIds.includes(p.uid)) posts.push({pid:s.key,...p}); } else { if(p.uid!==currentUser.uid) posts.push({pid:s.key,...p}); } });
    posts.sort((a,b)=>(b.time||0)-(a.time||0));
    cont.innerHTML='';
    if(!posts.length){ cont.innerHTML='<div class="empty-state">Лента пуста</div>'; return; }
    posts.forEach(p=>{
      const div=document.createElement('div'); div.className='post-card';
      const liked = p.likes && p.likes[currentUser.uid];
      div.innerHTML=`<div class="post-hd"><img src="/avatar${p.avatar||1}.png" class="post-hd-av" onclick="viewUser('${p.uid}')"><div style="flex:1"><div class="post-hd-name">${escapeHtml((p.displayName||'').toUpperCase())}</div><div class="post-hd-time">${p.time?new Date(p.time).toLocaleDateString():''}</div></div></div>${p.photo?`<img src="${p.photo}" class="post-photo">`:''}<div class="post-caption">${linkify(p.text||'')}</div><div class="post-actions"><button class="post-action ${liked?'liked':''}" onclick="toggleLike('${p.pid}')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${p.likes?Object.keys(p.likes).length:''}</button><button class="post-action" onclick="openComments('${p.pid}')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${p.commentCount||''}</button></div>`;
      cont.appendChild(div);
    });
  });
}

function switchFeedTab(tab){ feedTab=tab; document.querySelectorAll('.feed-tab').forEach(b=>b.classList.remove('active')); document.getElementById(tab==='subscriptions'?'ft-subs':'ft-rec').classList.add('active'); loadFeed(); }
function viewUser(uid){ location.href='profile.html?uid='+uid; }
function toggleLike(pid){ const ref=db.ref(`Posts/${pid}/likes/${currentUser.uid}`); ref.once('value').then(s=>{ if(s.exists()) ref.remove(); else ref.set(true); }); setTimeout(loadFeed,400); }
function openComments(pid){ activeCommentsPostId=pid; alert('Комментарии: '+pid); }
function openPostCreate(){ alert('Создание поста - в оригинале было модалкой'); }
function goBack(){ history.back(); }
function openChatWithViewed(){ if(currentViewedUid) location.href='chat.html?uid='+currentViewedUid; }
function openViewFans(){}
function openViewIdols(){}
function openReportUser(){}
function openSettingsSub(id){ document.querySelectorAll('.settings-sub').forEach(s=>s.classList.remove('active')); document.getElementById('settings-sub-'+id)?.classList.add('active'); }
function logout(){ auth.signOut().then(()=>location.href='auth.html'); }
function closeChat(){ history.back(); }
function openChatInfo(){}
function scrollToPinned(){}
function unpinMessage(){}
function cancelEdit(){ editingMsgKey=null; document.getElementById('edit-indicator')?.classList.add('hidden'); }
function cancelReply(){ replyingTo=null; document.getElementById('reply-indicator')?.classList.add('hidden'); }
function cancelVoice(){ isRecording=false; document.getElementById('voice-bar')?.classList.add('hidden'); }
function sendVoice(){ cancelVoice(); }
function closePhotoViewer(){ document.getElementById('photo-viewer')?.classList.add('hidden'); }
function downloadPhoto(){}

// Init
document.addEventListener('DOMContentLoaded',()=>{
  const page = location.pathname.split('/').pop()||'profile.html';
  const map={ 'profile.html':'account', 'feed.html':'feed', 'explore.html':'explore', 'chats.html':'chats', 'settings.html':'cabinet', 'activity.html':'activity' };
  const section = map[page]||'account';
  currentSection=section;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const target=document.getElementById('screen-'+section);
  if(target) target.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+section);
  if(nav) nav.classList.add('active');
  // splash fix
  if(sessionStorage.getItem('under_splash_done')){
    const s=document.getElementById('splash'); if(s){ s.style.display='none'; }
  } else {
    setTimeout(()=>{ hideSplash(); }, 900);
  }
  if(section==='feed') setTimeout(loadFeed, 600);
  if(section==='chats') setTimeout(renderChatsList, 600);
});

</script>
